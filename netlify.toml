[build]
base = "web"
# TypeScript is a required dev dependency for the build: tsc && vite build
command = "npm ci --include=dev && npm run build"
publish = "dist"

[build.environment]
NODE_VERSION = "20"
CI = "true"
VITE_V2_ENABLED = "true"

# Development/Preview context
[context.deploy-preview]
command = "npm ci --include=dev && npm run build"

[context.deploy-preview.environment]
NODE_ENV = "preview"
VITE_API_URL = "https://staging-api.moneygenerator.app"
VITE_V2_ENABLED = "true"

# Production context - optimized
[context.production]
command = "npm ci --include=dev && npm run build"

[context.production.environment]
NODE_ENV = "production"
VITE_API_URL = "https://api.moneygenerator.app"
VITE_V2_ENABLED = "true"

# Branch context for feature branches
[context."feature/*"]
command = "npm ci --include=dev && npm run build"

[context."feature/*".environment]
NODE_ENV = "development"
VITE_API_URL = "https://staging-api.moneygenerator.app"
VITE_V2_ENABLED = "true"

# API proxy for backend services - Production
[[redirects]]
from = "/api/v2/*"
to = "/.netlify/functions/proxy-api"
status = 200
force = true

[[redirects]]
from = "/api/v1/*"
to = "https://api.moneygenerator.app/api/v1/:splat"
status = 200
force = true

# Explicit static routes
[[redirects]]
from = "/health"
to = "/index.html"
status = 200

[[redirects]]
from = "/status"
to = "/index.html"
status = 200

# SPA fallback - must be last
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# HTML - short cache (no caching guidance)
[[headers]]
for = "/*.html"
[headers.values]
Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

# CSS/JS bundles - long cache with hash
[[headers]]
for = "/assets/*.{css,js}"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Static assets
[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Web fonts - aggressively cache
[[headers]]
for = "*.{woff,woff2,ttf,otf,eot}"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Images - moderate cache
[[headers]]
for = "/assets/images/*"
[headers.values]
Cache-Control = "public, max-age=2592000, stale-while-revalidate=604800"

# Security headers - production grade
[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"
Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.plaid.com https://cdn.segment.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://api.moneygenerator.app https://*.plaid.com https://*.segment.com; frame-src https://cdn.plaid.com; upgrade-insecure-requests"

# API headers
[[headers]]
for = "/api/*"
[headers.values]
Access-Control-Allow-Origin = "*"
Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, PATCH, OPTIONS"
Access-Control-Allow-Headers = "Content-Type, Authorization, X-User-ID"
Access-Control-Max-Age = "86400"
Cache-Control = "public, max-age=300, stale-while-revalidate=600"

# Netlify functions configuration
[functions]
directory = "netlify/functions"
node_bundler = "esbuild"

# Build processing
[build.processing.html]
pretty_urls = true

[build.processing.css]
bundle = true
minify = true

[build.processing.js]
bundle = true
minify = true

[build.processing.images]
compress = true
